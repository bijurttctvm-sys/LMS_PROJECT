services:
  - type: web
    name: lmsproject-web
    runtime: python
    plan: starter
    region: oregon
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn lms_project.wsgi:application
    healthCheckPath: /users/login/
    disk:
      name: lms-media
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - fromGroup: lms-shared-env
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lmsproject-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lmsproject-redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          type: keyvalue
          name: lmsproject-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: lmsproject-redis
          property: connectionString
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: SERVE_MEDIA
        value: true
      - key: CELERY_TASK_ALWAYS_EAGER
        value: false

  - type: worker
    name: lmsproject-worker
    runtime: python
    plan: starter
    region: oregon
    buildCommand: bash build.sh
    startCommand: celery -A lms_project worker --loglevel=info --concurrency=1
    envVars:
      - fromGroup: lms-shared-env
      - key: SECRET_KEY
        fromService:
          type: web
          name: lmsproject-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: lmsproject-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: lmsproject-redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          type: keyvalue
          name: lmsproject-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: lmsproject-redis
          property: connectionString
      - key: CELERY_TASK_ALWAYS_EAGER
        value: false

  - type: keyvalue
    name: lmsproject-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: lmsproject-db
    plan: basic-256mb
    region: oregon
    ipAllowList: []

envVarGroups:
  - name: lms-shared-env
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: USE_X_FORWARDED_PROTO
        value: true
      - key: CHATBOT_WARMUP_ENABLED
        value: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: true
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: MODAL_TOKEN_ID
        sync: false
      - key: MODAL_TOKEN_SECRET
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET_NAME
        sync: false
      - key: CLOUDFLARE_R2_ENDPOINT_URL
        sync: false
