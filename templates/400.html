{% extends "base.html" %}
{% block title %}Request Error — LMS{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card p-4 text-center">
      <h2 class="mb-2">We could not process that request</h2>
      <p class="text-muted mb-4">Please go back and try again. If the problem continues, contact the LMS administrator.</p>
      <div class="d-flex justify-content-center gap-2">
        <a href="{% url 'home' %}" class="btn btn-primary">Back to Home</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
