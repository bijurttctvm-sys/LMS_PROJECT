{% extends "base.html" %}
{% block title %}Add Trainees to Batch — LMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1"><i class="bi bi-people me-2 text-success"></i>Add Trainees to Batch</h5>
        <p class="text-muted mb-4" style="font-size:.875rem;">Batch: <strong>{{ batch.name }}</strong></p>

        <form method="post">
          {% csrf_token %}
          <div class="border rounded p-3" style="max-height: 420px; overflow-y: auto;">
            {% for student in students %}
            <div class="form-check py-2 border-bottom">
              <input class="form-check-input" type="checkbox" name="student_ids" value="{{ student.id }}"
                     id="student_{{ student.id }}" {% if student.id in assigned_ids %}checked disabled{% endif %}>
              <label class="form-check-label w-100" for="student_{{ student.id }}">
                <span class="fw-semibold">{{ student.get_full_name|default:student.username }}</span>
                <span class="text-muted">({{ student.username }})</span>
                {% if student.id in assigned_ids %}
                  <span class="badge bg-secondary ms-2">Already in batch</span>
                {% endif %}
              </label>
            </div>
            {% empty %}
            <p class="text-muted mb-0">No trainees available.</p>
            {% endfor %}
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-person-check me-1"></i>Save Trainees
            </button>
            <a href="{% url 'batch-list' %}?manage=assign-students" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
