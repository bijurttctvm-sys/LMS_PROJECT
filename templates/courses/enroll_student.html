{% extends "base.html" %}
{% block title %}Enroll Student — {{ course.title }}{% endblock %}
{% block content %}
<h3>Enroll Student in <em>{{ course.title }}</em></h3>
<form method="post" class="mt-3">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Select Student</label>
    <select name="student_id" class="form-select" required>
      <option value="">-- choose --</option>
      {% for student in students %}
        <option value="{{ student.id }}"
          {% if student.id in enrolled_ids %}disabled title="already enrolled"{% endif %}>
          {{ student.username }} ({{ student.email }})
          {% if student.id in enrolled_ids %} ✓{% endif %}
        </option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-success">Enroll</button>
  <a href="{% url 'course-detail' course.id %}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
